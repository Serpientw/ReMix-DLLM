dataset_name: 'sudoku'
model_path: "GSAI-ML/LLaDA-8B-Instruct"
data_root: "./data"

dataset_config:
  data_loader: 'custom_loader'
  loader_fn: 'sudoku_read_data'
  load_dataset_args: { path: "sudoku/4x4_test_sudoku.csv" }
  split: null
  doc_to_text_fn: "sudoku_doc_to_text"
  eval_fn: "sudoku_evaluate_and_extract"
  eval_mode: "partial_credit"
  prompt_suffix: "<reasoning>"

generation_args:
  gen_length: 256
  block_length: 128
  temperature: 0.0

method: 'remix' # default, remix
method_args:
  default:
    steps: 256
  remix:
    threshold: 0.8
    js_threshold: 0.3
    beta_mix: 0.6
